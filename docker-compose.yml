# Daily Taaza — full dev stack (MySQL + Node app serving API + frontend)
# Prerequisite: Docker Desktop running
# Start: npm run docker:up
services:
  mysql:
    image: mysql:8.4
    container_name: daily-taaza-mysql
    restart: unless-stopped
    ports:
      - "${DB_DOCKER_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-Dailytaaza@123}
      MYSQL_DATABASE: ${DB_NAME:-daily_taaza}
      MYSQL_USER: ${DB_USER:-daily_taaza}
      MYSQL_PASSWORD: ${DB_PASSWORD:-Dailytaaza@123}
    volumes:
      - daily_taaza_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s

  app:
    build: .
    container_name: daily-taaza-app
    restart: unless-stopped
    ports:
      - "${PORT:-3456}:3456"
    environment:
      NODE_ENV: development
      PORT: 3456
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-daily_taaza}
      DB_PASSWORD: ${DB_PASSWORD:-Dailytaaza@123}
      DB_NAME: ${DB_NAME:-daily_taaza}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  daily_taaza_mysql_data:
